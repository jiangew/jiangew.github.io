<nav class="{% if page.title == "Home" %}nav-home{% else %}nav{% endif %}">
    <ul class="list">
        <li class="item">
            <a class="link {% if page.title == "Home" %}active{% endif %}" href="{{ site.url }}/">Home</a>
        </li>

        {% if site.projects == true %}
            <li class="item">
                <a class="link {% if page.title == "Projects" or page.title == "Project" %}active{% endif %}" href="{{ site.url }}/projects">Projects</a>
            </li>
        {% endif %}
        
        {% if site.blog == true %}
            <li class="item">
                <a class="link {% if page.title == "Blog" %}active{% endif %}" href="{{ site.url }}/blog">Blog</a>
            </li>
        {% endif %}

        {% if site.hub == true %}
            <li class="item">
                <a class="link {% if page.title == "Hub" %}active{% endif %}" href="{{ site.url }}/hub">Hub</a>
            </li>
        {% endif %}
    </ul>
</nav>
